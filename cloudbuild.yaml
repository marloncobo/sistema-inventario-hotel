substitutions:
  _REGION: us-central1
  _REPOSITORY: lunara-inventory
  _CLOUD_SQL_CONNECTION_NAME: your-project:us-central1:lunara-postgres
  _DB_USER: postgres
  _DB_PASSWORD_SECRET: lunara-db-password
  _JWT_SECRET: lunara-jwt-secret
  _CLOUD_SQL_IP_TYPES: PRIVATE
  _IDENTITY_DB: lunara_identity
  _MASTERDATA_DB: lunara_masterdata
  _INVENTORY_DB: lunara_inventory

steps:
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe "$_REPOSITORY" --location="$_REGION" >/dev/null 2>&1 || \
        gcloud artifacts repositories create "$_REPOSITORY" \
          --repository-format=docker \
          --location="$_REGION" \
          --description="Lunara Inventory container images"

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/Dockerfile.identity
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/identity-service:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/Dockerfile.masterdata
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/masterdata-service:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/Dockerfile.inventory
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/inventory-service:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/identity-service:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/masterdata-service:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/inventory-service:$COMMIT_SHA

  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy identity-service \
          --image "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/identity-service:$COMMIT_SHA" \
          --region "$_REGION" \
          --platform managed \
          --allow-unauthenticated \
          --add-cloudsql-instances "$_CLOUD_SQL_CONNECTION_NAME" \
          --set-env-vars "^@^SPRING_PROFILES_ACTIVE=gcp@DB_NAME=$_IDENTITY_DB@DB_USER=$_DB_USER@CLOUD_SQL_CONNECTION_NAME=$_CLOUD_SQL_CONNECTION_NAME@CLOUD_SQL_IP_TYPES=$_CLOUD_SQL_IP_TYPES@APP_JWT_EXPIRATION_MINUTES=480" \
          --set-secrets "DB_PASSWORD=$_DB_PASSWORD_SECRET:latest,APP_JWT_SECRET=$_JWT_SECRET:latest"

  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy masterdata-service \
          --image "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/masterdata-service:$COMMIT_SHA" \
          --region "$_REGION" \
          --platform managed \
          --allow-unauthenticated \
          --add-cloudsql-instances "$_CLOUD_SQL_CONNECTION_NAME" \
          --set-env-vars "^@^SPRING_PROFILES_ACTIVE=gcp@DB_NAME=$_MASTERDATA_DB@DB_USER=$_DB_USER@CLOUD_SQL_CONNECTION_NAME=$_CLOUD_SQL_CONNECTION_NAME@CLOUD_SQL_IP_TYPES=$_CLOUD_SQL_IP_TYPES" \
          --set-secrets "DB_PASSWORD=$_DB_PASSWORD_SECRET:latest,APP_JWT_SECRET=$_JWT_SECRET:latest"

  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy inventory-service \
          --image "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/inventory-service:$COMMIT_SHA" \
          --region "$_REGION" \
          --platform managed \
          --allow-unauthenticated \
          --add-cloudsql-instances "$_CLOUD_SQL_CONNECTION_NAME" \
          --set-env-vars "^@^SPRING_PROFILES_ACTIVE=gcp@DB_NAME=$_INVENTORY_DB@DB_USER=$_DB_USER@CLOUD_SQL_CONNECTION_NAME=$_CLOUD_SQL_CONNECTION_NAME@CLOUD_SQL_IP_TYPES=$_CLOUD_SQL_IP_TYPES" \
          --set-secrets "DB_PASSWORD=$_DB_PASSWORD_SECRET:latest,APP_JWT_SECRET=$_JWT_SECRET:latest"

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/identity-service:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/masterdata-service:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/inventory-service:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
