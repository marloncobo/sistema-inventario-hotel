server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://google/${DB_NAME:lunara_identity}?socketFactory=com.google.cloud.sql.postgres.SocketFactory&cloudSqlInstance=${CLOUD_SQL_CONNECTION_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.data-source-properties.ipTypes=${CLOUD_SQL_IP_TYPES:PRIVATE}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:480}
