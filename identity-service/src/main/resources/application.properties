spring.application.name=identity-service
server.port=${PORT:${SERVER_PORT:8081}}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lunara_identity}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

app.jwt.secret=${APP_JWT_SECRET:lunara-super-secret-key-very-secure-2026-123456}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:480}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
