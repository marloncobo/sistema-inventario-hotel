spring.application.name=masterdata-service
server.port=${PORT:${SERVER_PORT:8082}}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lunara_masterdata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
app.jwt.secret=${APP_JWT_SECRET:lunara-super-secret-key-very-secure-2026-123456}
