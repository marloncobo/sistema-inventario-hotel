server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: rooms-service
  datasource:
    url: jdbc:h2:mem:roomsdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

services:
  inventory:
    base-url: ${INVENTORY_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:hotel-inventory-demo-secret-key-32}
