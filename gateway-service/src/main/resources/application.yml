server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: inventory-service
              uri: ${INVENTORY_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/inventory/**
              filters:
                - StripPrefix=1
            - id: rooms-service
              uri: ${ROOMS_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/rooms/**
              filters:
                - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:hotel-inventory-demo-secret-key-32}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
