server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://google/${DB_NAME:lunara_inventory}?socketFactory=com.google.cloud.sql.postgres.SocketFactory&cloudSqlInstance=${CLOUD_SQL_CONNECTION_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.data-source-properties.ipTypes=${CLOUD_SQL_IP_TYPES:PRIVATE}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}

app.jwt.secret=${APP_JWT_SECRET}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
