services:
  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081

  rooms-service:
    build:
      context: ./rooms-service
    container_name: rooms-service
    depends_on:
      - inventory-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      INVENTORY_SERVICE_URL: http://inventory-service:8081

  gateway-service:
    build:
      context: ./gateway-service
    container_name: gateway-service
    depends_on:
      - inventory-service
      - rooms-service
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      INVENTORY_SERVICE_URL: http://inventory-service:8081
      ROOMS_SERVICE_URL: http://rooms-service:8082